name: CI

on:
  push:
    branches: [ main, 001-ll1-lexer-generator ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore legendary-octo-system.sln

      - name: Build
        run: dotnet build legendary-octo-system.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/Legendary.LexerGenerator.Tests --no-build --verbosity minimal
